name: CI
on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install_args: dagger
      - name: Prepare .env
        run: |
          echo $DOCKER_HOST
          cat <<EOF > .env
          forgeDev_test_docker=$(which docker)
          forgeDev_test_dockerSock=$(docker context inspect --format '{{.Endpoints.docker.Host}}' | sed 's|unix://||')
          EOF
      - run: dagger check
